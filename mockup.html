<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoMotion Annotated Wireframe</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e5e5e5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            margin: 0;
            color: #000;
        }

        .wireframe-container {
            background-color: #fff;
            width: 1000px;
            padding: 30px;
            border: 2px solid #000;
            box-shadow: 5px 5px 0px rgba(0,0,0,0.2);
            box-sizing: border-box;
        }

        /* Highlight Styles */
        .highlight-box {
            border: 3px solid #ff0000 !important;
            position: relative;
        }

        .highlight-badge {
            position: absolute;
            top: -18px;
            left: -18px;
            background-color: #ff0000;
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
            z-index: 10;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        /* 1. Navbar Wireframe */
        .navbar {
            border: 2px solid #000;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            font-size: 14px;
        }

        .nav-item.active { text-decoration: underline; }
        .placeholder-icon {
            width: 20px;
            height: 20px;
            border: 1px solid #000;
            border-radius: 50%;
        }

        /* Header & Info Box (Non-highlighted) */
        .page-title {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .info-box {
            border: 2px dashed #666;
            padding: 15px;
            margin: 0 auto 20px auto;
            width: 90%;
            font-size: 13px;
            line-height: 1.5;
            background-color: #fafafa;
            text-align: center;
            color: #555;
        }

        /* Main Content Area - Split Layout */
        .main-content {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .left-column {
            width: 60%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .right-column {
            width: 35%;
        }

        /* 2. Generic Visualization Area */
        .visualization-area {
            border: 2px dashed #000;
            height: 300px;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .visualization-text {
            font-size: 16px;
            font-weight: bold;
            color: #666;
            letter-spacing: 2px;
            text-align: center;
        }

        /* 3. Control Panel Wireframe */
        .control-panel {
            border: 2px solid #000;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            background-color: #fff;
        }

        .control-group {
            border: 1px solid #999;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            background-color: #f9f9f9;
            width: 100%;
            justify-content: center;
            box-sizing: border-box;
        }

        .input-box {
            border: 1px solid #000;
            padding: 6px;
            width: 100px;
            font-size: 12px;
            color: #666;
            background: #fff;
            text-align: center;
        }

        .btn {
            border: 2px solid #000;
            padding: 6px 15px;
            font-size: 12px;
            font-weight: bold;
            background: #e0e0e0;
            cursor: pointer;
        }

        /* 4. Code Observer Panel */
        .code-panel {
            border: 2px solid #000;
            height: 100%;
            background-color: #fff;
            display: flex;
            flex-direction: column;
        }

        .code-header {
            border-bottom: 2px solid #000;
            padding: 10px 15px;
            font-size: 12px;
            font-weight: bold;
            background-color: #f0f0f0;
        }

        .code-content {
            padding: 15px;
            display: flex;
            gap: 15px;
            flex-grow: 1;
        }

        .line-numbers {
            display: flex;
            flex-direction: column;
            gap: 12px;
            font-size: 12px;
            color: #666;
            border-right: 1px solid #ccc;
            padding-right: 10px;
        }

        .code-lines {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            padding-top: 2px;
        }

        .skeleton-text {
            height: 10px;
            background-color: #ccc;
        }

        .code-controls {
            border-top: 2px solid #000;
            padding: 12px 15px;
            display: flex;
            justify-content: center;
            font-size: 11px;
            background-color: #f0f0f0;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="wireframe-container">
        
        <div class="navbar highlight-box">
            <div class="highlight-badge">1</div>
            <div class="nav-links">
                <span class="nav-item">Menu Utama</span>
                <span class="nav-item active">Topik Struktur Data</span>
                <span class="nav-item">Topik Lainnya</span>
            </div>
            <div class="placeholder-icon"></div>
        </div>

        <div class="page-title">[Nama Struktur Data]</div>
        <div class="info-box">
            Area teks untuk deskripsi singkat atau analogi teori.
        </div>

        <div class="main-content">
            <div class="left-column">
                
                <div class="visualization-area highlight-box">
                    <div class="highlight-badge">2</div>
                    <div class="visualization-text">&lt;canvas&gt;<br><br>AREA VISUALISASI HTML5</div>
                </div>

                <div class="control-panel highlight-box">
                    <div class="highlight-badge">3</div>
                    <div class="control-group">
                        <div class="input-box">Input Data Angka</div>
                        <div class="btn">Insert</div>
                        <div class="btn">Delete</div>
                    </div>
                    <div class="btn">Clear Board</div>
                </div>

            </div>

            <div class="right-column">
                
                <div class="code-panel highlight-box">
                    <div class="highlight-badge">4</div>
                    <div class="code-header">
                        [ ] PANEL KODE LOGIKA (PYTHON ADT)
                    </div>
                    <div class="code-content">
                        <div class="line-numbers">
                            <span>1</span>
                            <span>2</span>
                            <span>3</span>
                            <span>4</span>
                            <span>5</span>
                            <span>6</span>
                        </div>
                        <div class="code-lines">
                            <div class="skeleton-text" style="width: 50%;"></div>
                            <div class="skeleton-text" style="width: 80%;"></div>
                            <div class="skeleton-text" style="width: 60%;"></div>
                            <div class="skeleton-text" style="width: 90%;"></div>
                            <div class="skeleton-text" style="width: 40%;"></div>
                            <div class="skeleton-text" style="width: 70%;"></div>
                        </div>
                    </div>
                    <div class="code-controls">
                        Mode Eksekusi Step-by-Step
                    </div>
                </div>

            </div>
        </div>

    </div>

</body>
</html>
