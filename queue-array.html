<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue (Array) – DS Visualizer</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<a href="index.html" class="back">← Back</a>
<h2>Queue – Array Implementation</h2>

<div id="initScreen">
    <label>Max size: <input id="sizeInput" type="number" min="1" max="20" placeholder="e.g. 6" /></label>
    <button onclick="initQueue()">Create Queue</button>
</div>

<div id="mainScreen" style="display:none">
    <div class="controls">
        <span class="ctrl-group">
            <label>Enqueue</label>
            <input id="enqVal" type="number" placeholder="value" />
            <button onclick="doEnqueue()">Enqueue</button>
        </span>
        <span class="ctrl-group">
            <label>Dequeue</label>
            <button onclick="doDequeue()">Dequeue</button>
        </span>
        <span class="ctrl-group">
            <label>isEmpty</label>
            <button onclick="doIsEmpty()">Check</button>
        </span>
        <span class="ctrl-group">
            <button class="btn-reset" onclick="resetQueue()">Reset</button>
        </span>
    </div>

    <div class="viz-row">
        <canvas id="c"></canvas>
        <div class="code-panel">
            <div class="code-label">// Python</div>
            <pre id="codeDisplay">No operations yet.</pre>
        </div>
    </div>
    <div id="msg" class="msg"></div>
</div>

<!-- POPUP -->
<div class="popup-overlay" id="popupOverlay">
    <div class="popup-box">
        <div class="popup-icon">⚠️</div>
        <p id="popupMsg"></p>
        <button onclick="closePopup()">OK</button>
    </div>
</div>

<script src="popup.js"></script>
<script>
// Vertical queue: REAR at top (enqueue), FRONT at bottom (dequeue)
// Visually: top row = rear (new items added here), bottom row = front (items removed here)

const CELL_W = 160, CELL_H = 50, CELL_X = 20;
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

let queue   = [];  // queue[0] = front, queue[last] = rear
let maxSize = 0;

function initQueue() {
    const size = parseInt(document.getElementById('sizeInput').value);
    if (!size || size < 1) { showPopup('Please enter a valid size.'); return; }
    maxSize = size;
    queue   = [];
    document.getElementById('initScreen').style.display = 'none';
    document.getElementById('mainScreen').style.display = 'block';
    resizeCanvas();
    draw();
    setCode('# Create ADT Queue (Static Structure)\nclass Queue:\n    # Limitations: Space O(n)\n    max_size = ' + size);
}

function resetQueue() {
    queue = [];
    draw();
    setCode('# Reset ADT Queue\n# head = 0, tail = 0');
    setMsg('');
}

function doEnqueue() {
    const val = parseFloat(document.getElementById('enqVal').value);
    if (isNaN(val)) { showPopup('Please enter a value to enqueue.'); return; }
    if (queue.length >= maxSize) { showPopup('Queue is full! Max size is ' + maxSize + '.'); return; }
    queue.push(val);  // add to rear
    draw();
    setCode('# Performance: O(1)\n# Menambah elemen di Rear\n\nenqueue(' + val + ')\n\n# State (Front→Rear): ' + fmt());
    setMsg('Enqueued ' + val + '. Size: ' + queue.length + '/' + maxSize);
    document.getElementById('enqVal').value = '';
}

function doDequeue() {
    if (queue.length === 0) { showPopup('Queue is empty! Cannot dequeue.'); return; }
    const val = queue.shift();  // remove from front
    draw();
    setCode('# Performance: O(1)\n# Menghapus elemen di Front\n\nremoved_val = dequeue()\n# removed_val = ' + val + '\n\n# State (Front→Rear): ' + fmt());
    setMsg('Dequeued ' + val + '. Size: ' + queue.length + '/' + maxSize);
}

function doIsEmpty() {
    const empty = queue.length === 0;
    draw();
    setCode('# Performance: O(1)\n# Mengecek apakah queue kosong\n\nstatus = isempty()\n# status = ' + empty);
    setMsg('isEmpty → ' + empty);
}

// ── Draw ──────────────────────────────────────────────────────
// Slot 0 at visual bottom = FRONT, slot maxSize-1 at visual top = REAR
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let slot = 0; slot < maxSize; slot++) {
        // slot 0 (front) drawn at bottom
        const visualRow = maxSize - 1 - slot;
        const y         = 10 + visualRow * CELL_H;
        const val       = queue[slot];
        const hasVal    = val !== undefined;
        const isFront   = hasVal && slot === 0;
        const isRear    = hasVal && slot === queue.length - 1;

        ctx.fillStyle   = isFront ? '#e8f5e9' : isRear ? '#fffbe6' : hasVal ? '#fff' : '#f9f9f9';
        ctx.fillRect(CELL_X, y, CELL_W, CELL_H);
        ctx.strokeStyle = isFront ? '#4CAF50' : isRear ? '#f0a500' : hasVal ? '#333' : '#ddd';
        ctx.lineWidth   = (isFront || isRear) ? 2 : 1;
        ctx.strokeRect(CELL_X, y, CELL_W, CELL_H);

        ctx.fillStyle    = hasVal ? '#111' : '#bbb';
        ctx.font         = hasVal ? 'bold 15px Arial' : '12px Arial';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(hasVal ? val : 'empty', CELL_X + CELL_W / 2, y + CELL_H / 2);

        // side labels
        if (isFront) {
            ctx.fillStyle = '#4CAF50';
            ctx.font      = 'bold 11px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('← FRONT (dequeue)', CELL_X + CELL_W + 8, y + CELL_H / 2);
        }
        if (isRear && queue.length > 1) {
            ctx.fillStyle = '#f0a500';
            ctx.font      = 'bold 11px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('← REAR (last enqueued)', CELL_X + CELL_W + 8, y + CELL_H / 2);
        }
        if (isFront && queue.length === 1) {
            ctx.fillStyle = '#888';
            ctx.font      = '11px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('← FRONT & REAR', CELL_X + CELL_W + 8, y + CELL_H / 2);
        }
    }

    // labels
    ctx.fillStyle    = '#888';
    ctx.font         = '11px Arial';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText('▲ ENQUEUE (rear)', CELL_X + CELL_W / 2, 10 + maxSize * CELL_H + 6);
}

function resizeCanvas() {
    canvas.width  = CELL_X * 2 + CELL_W + 200;
    canvas.height = 10 + maxSize * CELL_H + 30;
}

function fmt() { return '[' + queue.join(', ') + ']'; }
function setCode(t) { document.getElementById('codeDisplay').textContent = t; }
function setMsg(t)  { document.getElementById('msg').textContent = t; }
</script>
</body>
</html>
