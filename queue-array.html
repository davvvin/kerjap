<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue (Array) – DS Visualizer</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
</head>

<body>

    <a href="index.html" class="back">← Back</a>
    <h2>Queue – Array Implementation</h2>

    <div id="initScreen">
        <label>Max size: <input id="sizeInput" type="number" min="1" max="20" placeholder="e.g. 6" /></label>
        <button onclick="initQueue()">Create Queue</button>
    </div>

    <div id="mainScreen" style="display:none">
        <div class="controls">
            <span class="ctrl-group">
                <label>Enqueue</label>
                <input id="enqVal" type="number" placeholder="value" />
                <button onclick="doEnqueue()">Enqueue</button>
            </span>
            <span class="ctrl-group">
                <label>Dequeue</label>
                <button onclick="doDequeue()">Dequeue</button>
            </span>
            <span class="ctrl-group">
                <label>isEmpty</label>
                <button onclick="doIsEmpty()">Check</button>
            </span>
            <span class="ctrl-group">
                <button class="btn-reset" onclick="resetQueue()">Reset</button>
            </span>
        </div>

        <div class="viz-row">
            <canvas id="c"></canvas>
            <div class="code-panel">
                <div class="code-label">// Python</div>
                <pre><code id="codeDisplay" class="language-python">No operations yet.</code></pre>
            </div>
        </div>
        <div id="msg" class="msg"></div>
    </div>

    <!-- POPUP -->
    <div class="popup-overlay" id="popupOverlay">
        <div class="popup-box">
            <div class="popup-icon">⚠️</div>
            <p id="popupMsg"></p>
            <button onclick="closePopup()">OK</button>
        </div>
    </div>

    <script>
// popup.js — shared error popup utility

function showPopup(message) {
    document.getElementById('popupMsg').textContent = message;
    document.getElementById('popupOverlay').classList.add('show');
}

function closePopup() {
    document.getElementById('popupOverlay').classList.remove('show');
}

// close on overlay click
document.addEventListener('click', function(e) {
    if (e.target.id === 'popupOverlay') closePopup();
});

</script>
    <script>
        // Vertical queue: REAR at top (enqueue), FRONT at bottom (dequeue)
        // Visually: top row = rear (new items added here), bottom row = front (items removed here)

        const CELL_W = 160, CELL_H = 50, CELL_X = 20;
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');

        let queue = [];  // queue[0] = front, queue[last] = rear
        let maxSize = 0;

        function initQueue() {
            const size = parseInt(document.getElementById('sizeInput').value);
            if (!size || size < 1) { showPopup('Please enter a valid size.'); return; }
            maxSize = size;
            queue = [];
            document.getElementById('initScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'block';
            resizeCanvas();
            draw();
            setCode('# Create ADT Queue (Static Structure)\nclass Queue:\n    # Limitations: Space O(n)\n    max_size = ' + size);
        }

        function resetQueue() {
            queue = [];
            draw();
            setCode('# Reset ADT Queue\n# head = 0, tail = 0');
            setMsg('');
        }

        function doEnqueue() {
            const val = parseFloat(document.getElementById('enqVal').value);
            if (isNaN(val)) { showPopup('Please enter a value to enqueue.'); return; }
            if (queue.length >= maxSize) { showPopup('Queue is full! Max size is ' + maxSize + '.'); return; }
            queue.push(val);  // add to rear
            draw();
            setCode(`def insert(self, X):
    # X = ${val}
    if (self.isEmpty()):
        self.head = 1
        self.tail = 1
    else:
        if (self.tail == self.MaxEl):
            self.tail = 1
        else:
            self.tail = self.tail + 1
    self.items[self.tail] = X

# State (Front→Rear): ${fmt()}`);
            setMsg('Enqueued ' + val + '. Size: ' + queue.length + '/' + maxSize);
            document.getElementById('enqVal').value = '';
        }

        function doDequeue() {
            if (queue.length === 0) { showPopup('Queue is empty! Cannot dequeue.'); return; }
            const val = queue.shift();  // remove from front
            draw();
            setCode(`def delete(self):
    X = self.items[self.head]
    if (self.head == self.tail):
        self.head = 0
        self.tail = 0
    else:
        if (self.head == self.MaxEl):
            self.head = 1
        else:
            self.head = self.head + 1
    return X

# removed_val = ${val}
# State (Front→Rear): ${fmt()}`);
            setMsg('Dequeued ' + val + '. Size: ' + queue.length + '/' + maxSize);
        }

        function doIsEmpty() {
            const empty = queue.length === 0;
            draw();
            setCode(`def isEmpty(self):
    return (self.head == 0 and self.tail == 0)

# status = ${empty}`);
            setMsg('isEmpty → ' + empty);
        }

        // Horizontal layout: FRONT on left, REAR on right
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let slot = 0; slot < maxSize; slot++) {
                const x = CELL_X + slot * CELL_W;
                const y = 40;
                const val = queue[slot];
                const hasVal = val !== undefined;
                const isFront = hasVal && slot === 0;
                const isRear = hasVal && slot === queue.length - 1;

                ctx.fillStyle = isFront ? '#e8f5e9' : isRear ? '#fffbe6' : hasVal ? '#fff' : '#f9f9f9';
                ctx.fillRect(x, y, CELL_W, CELL_H);
                ctx.strokeStyle = isFront ? '#4CAF50' : isRear ? '#f0a500' : hasVal ? '#333' : '#ddd';
                ctx.lineWidth = (isFront || isRear) ? 2 : 1;
                ctx.strokeRect(x, y, CELL_W, CELL_H);

                ctx.fillStyle = hasVal ? '#111' : '#bbb';
                ctx.font = hasVal ? 'bold 15px Arial' : '12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(hasVal ? val : 'empty', x + CELL_W / 2, y + CELL_H / 2);

                // side labels
                ctx.font = 'bold 11px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                if (isFront && queue.length === 1) {
                    ctx.fillStyle = '#888';
                    ctx.fillText('FRONT & REAR', x + CELL_W / 2, y - 4);
                } else if (isFront) {
                    ctx.fillStyle = '#4CAF50';
                    ctx.fillText('FRONT', x + CELL_W / 2, y - 4);
                } else if (isRear) {
                    ctx.fillStyle = '#f0a500';
                    ctx.fillText('REAR', x + CELL_W / 2, y - 4);
                }

                ctx.fillStyle = '#888';
                ctx.font = '11px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                ctx.fillText('[' + slot + ']', x + CELL_W / 2, y + CELL_H + 6);
            }
        }

        function resizeCanvas() {
            canvas.width = CELL_X * 2 + maxSize * CELL_W;
            canvas.height = 130;
        }

        function fmt() { return '[' + queue.join(', ') + ']'; }
        function setCode(t) { 
            const el = document.getElementById('codeDisplay');
            el.textContent = t; 
            if (window.Prism) Prism.highlightElement(el);
        }
        function setMsg(t) { document.getElementById('msg').textContent = t; }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
</body>

</html>
